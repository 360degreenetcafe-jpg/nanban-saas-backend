# Manual deploy: GitHub repo → Actions → this workflow → Run workflow.
# If deploy fails with secretmanager.secrets.get 403, grant the JSON key service account:
#   roles/secretmanager.secretAccessor (project-level is simplest) in Google Cloud IAM.
name: Deploy Firebase Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy Firebase Production
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm install

      - name: Deploy Firestore and Functions
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "Missing FIREBASE_PROJECT_ID secret"
            exit 1
          fi
          firebase deploy --project "$FIREBASE_PROJECT_ID" --only firestore:rules,firestore:indexes,functions
