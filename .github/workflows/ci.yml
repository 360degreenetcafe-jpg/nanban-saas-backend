name: CI - Lint and Firebase E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-syntax:
    name: Lint and Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm install

      - name: Run lint script
        working-directory: functions
        run: npm run lint

      - name: Syntax check all JS files
        run: |
          find functions/src functions/test -type f -name "*.js" -print0 | xargs -0 -n1 node --check

  e2e-emulator-gate:
    name: Firebase Emulator E2E
    needs: lint-and-syntax
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm install

      - name: Run Full E2E Bootstrap Test
        run: >
          firebase emulators:exec --only firestore,auth
          "cd functions &&
          FIRESTORE_EMULATOR_HOST=127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099
          GCLOUD_PROJECT=nanban-driving-school-d7b20
          npm run test:e2e:bootstrap"
# Production deploy: use workflow "Deploy Firebase Production" (manual) after Secret Manager IAM is fixed.
