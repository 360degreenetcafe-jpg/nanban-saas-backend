name: CI/CD - Firebase Gate and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-syntax:
    name: Lint and Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm install

      - name: Run lint script
        working-directory: functions
        run: npm run lint

      - name: Syntax check all JS files
        run: |
          find functions/src functions/test -type f -name "*.js" -print0 | xargs -0 -n1 node --check

  e2e-emulator-gate:
    name: Firebase Emulator E2E
    needs: lint-and-syntax
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Functions Dependencies
        working-directory: functions
        run: npm install

      - name: Run Full E2E Bootstrap Test
        run: >
          firebase emulators:exec --only firestore,auth
          "cd functions &&
          FIRESTORE_EMULATOR_HOST=127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099
          GCLOUD_PROJECT=nanban-driving-school-d7b20
          npm run test:e2e:bootstrap"

  deploy-production:
    name: Deploy Firebase Production
    needs: e2e-emulator-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore and Functions
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "Missing FIREBASE_PROJECT_ID secret"
            exit 1
          fi
          firebase deploy --project "$FIREBASE_PROJECT_ID" --only firestore:rules,firestore:indexes,functions
